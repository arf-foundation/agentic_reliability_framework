name: Python Package using Conda

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # silence Node 20 warning (optional)
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: arf
          auto-activate: true          # fixes the deprecation warning

      - name: Conda info
        run: conda info

      - name: Run stress tests
        run: |
          pytest tests/stress/ -m stress --timeout=300
