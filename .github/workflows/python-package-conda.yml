name: Python Package using Conda

on:
  push:
  pull_request:
  schedule:
    - cron: '0 2 * * *'   # 2am UTC daily

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: '3.10'
    - name: Add conda to system path
      run: |
        # $CONDA is an environment variable pointing to the root of the miniconda directory
        echo $CONDA/bin >> $GITHUB_PATH
    - name: Install dependencies
      run: |
        conda env update --file environment.yml --name base
        # Additional test dependencies
        pip install hypothesis pytest-benchmark
    - name: Lint with flake8
      run: |
        conda install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest (including property tests)
      run: |
        conda install pytest
        pytest tests/ --ignore=tests/benchmarks/ --ignore=tests/stress/ -m "not stress"
    - name: Install test tools for coverage
      run: |
        pip install pytest-cov bandit
    - name: Test with coverage
      run: |
        pytest tests/ --ignore=tests/benchmarks/ --ignore=tests/stress/ -m "not stress" --cov=agentic_reliability_framework --cov-report=xml --cov-report=html
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    - name: Security scan with bandit
      run: |
        bandit -r agentic_reliability_framework -f json -o bandit-report.json || true
    - name: Upload bandit report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-report
        path: bandit-report.json

  benchmark:
    if: github.ref == 'refs/heads/main'   # only on main branch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Add conda to system path
        run: echo $CONDA/bin >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          conda env update --file environment.yml --name base
          pip install pytest-benchmark
      - name: Run benchmarks
        run: pytest tests/benchmarks/ --benchmark-only --benchmark-json benchmark.json
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.json

  stress:
    if: github.event_name == 'schedule'   # nightly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'
      - name: Add conda to system path
        run: echo $CONDA/bin >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          conda env update --file environment.yml --name base
      - name: Run stress tests
        run: pytest tests/stress/ -m stress --timeout=300
