name: Python Package using Conda

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}          # ensures Conda environment is active

    steps:
      - uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: arf
          auto-activate-base: false

      - name: Conda info
        run: conda info

      - name: Install dependencies (if any extra)
        run: |
          conda install -c conda-forge pytest-timeout  # fallback, but already in env.yml
          pip install -e .                             # ensure package is installed

      - name: Run stress tests
        run: |
          pytest tests/stress/ -m stress --timeout=300
