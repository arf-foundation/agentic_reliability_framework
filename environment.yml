name: arf
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy                      # runtime dependency (also in pyproject.toml)
  - pydantic>=2.0              # runtime dependency
  - pyyaml                     # runtime dependency
  - cryptography               # needed by healing_intent.py
  - pytest                     # test runner
  - pytest-asyncio             # async test support
  - pytest-cov                 # coverage reporting
  - pytest-timeout             # enables --timeout flag
  - pip:
    - -e .                     # install the package in editable mode (reads pyproject.toml)
